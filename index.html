<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hardy School HVAC — Warrant Article 67</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Use Flexbox on the body to cleanly separate the stage area from the nav */
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #1a0507; 
      display: flex;
      flex-direction: column;
    }
    
    /* The wrapper fills all space above the nav bar */
    #stage-wrapper {
      flex: 1;
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    #stage {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 960px;
      height: 540px;
      /* REMOVED: transform-origin: top left; -> Letting it default to center fixes the scaling math */
      /* transform set by JS */
    }

    #nav {
      /* REMOVED: position: fixed; -> Flexbox naturally keeps this at the bottom */
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px; /* Slightly taller padding for mobile thumbs */
      z-index: 100;
      background: #1a0507;
    }

    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 10px 20px; /* Increased touch target for mobile */
      border-radius: 6px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .dot {
      height: 12px; /* Increased from 8px for mobile tap targets */
      border-radius: 6px;
      background: rgba(255,255,255,0.2);
      cursor: pointer; 
      transition: width 0.25s;
      display: inline-block;
    }
    .dot.active { background: rgba(255,255,255,0.65); }
  </style>
</head>
<body>

<div id="stage-wrapper">
  <div id="stage">
    <div id="react-root" style="width:960px;height:540px;position:relative;overflow:hidden"></div>
  </div>
</div>

<div id="nav">
  <button class="nav-btn" id="prev-btn">← Prev</button>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <div id="dots" style="display:flex;gap:8px"></div>
    <div id="slide-label" style="font-family:'Source Sans 3',sans-serif;font-size:11px;color:rgba(255,255,255,0.3)"></div>
  </div>
  <button class="nav-btn" id="next-btn">Next →</button>
</div>

<script>
  // Scale the stage based on the exact dimensions of the wrapper, 
  // bypassing iOS Safari URL bar quirks and overlapping issues.
  function scaleStage() {
    const wrapper = document.getElementById('stage-wrapper');
    const el = document.getElementById('stage');
    if (!wrapper || !el) return;

    const vw = wrapper.clientWidth;
    const vh = wrapper.clientHeight;
    
    // Calculate scale, leaving a tiny 16px buffer so the slide doesn't scrape the edge of the glass on mobile
    const scale = Math.min((vw - 16) / 960, (vh - 16) / 540);
    
    el.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  
  window.addEventListener('resize', scaleStage);
  document.addEventListener('DOMContentLoaded', scaleStage);
  // Ensure it fires after fonts/React render
  setTimeout(scaleStage, 100); 
  setTimeout(scaleStage, 500);
</script>

<script type="text/babel">
  const { useState, useEffect, useCallback } = React;

  const BURG  = "#5e1315";
  const BURG2 = "#8b2326";
  const WHITE = "#FFFFFF";
  const CREAM = "#F8F5F2";
  const PALE  = "#F1EBE8";
  const GREEN = "#15803D";
  const LGREY = "#B0B8C4";
  const PF    = "'Playfair Display', Georgia, serif";
  const SS    = "'Source Sans 3', sans-serif";

  const slide = { width: 960, height: 540, position: "relative", overflow: "hidden", display: "flex", flexDirection: "column" };

  function Bar({ n, total }) {
    return (
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 6, background: "rgba(0,0,0,0.12)" }}>
        <div style={{ height: "100%", width: `${(n / total) * 100}%`, background: BURG2 }} />
      </div>
    );
  }

  // ── SLIDE 1 ──────────────────────────────────────────────────────────────
  function Slide1() {
    return (
      <div style={{ ...slide, background: BURG }}>
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 7, background: BURG2 }} />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "48px 80px" }}>
          <div style={{ fontFamily: SS, fontSize: 13, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(255,255,255,0.45)", marginBottom: 26 }}>
            Town of Arlington · Annual Town Meeting · May X, 2026
          </div>
          <div style={{ fontFamily: PF, fontSize: 44, color: WHITE, lineHeight: 1.2, marginBottom: 60 }}>
            Warrant Article 67 —<br />Hardy School HVAC Feasibility Study
          </div>
          <div style={{ fontFamily: SS, fontSize: 15, letterSpacing: "0.16em", textTransform: "uppercase", color: "rgba(255,255,255,0.5)", marginBottom: 14 }}>
            FY27 Appropriation Request
          </div>
          <div style={{ fontFamily: PF, fontSize: 80, color: WHITE, lineHeight: 1 }}>
            $375,000
          </div>
        </div>
      </div>
    );
  }

  // ── SLIDE 2 ──────────────────────────────────────────────────────────────
  function Slide2() {
    return (
      <div style={{ ...slide, background: CREAM }}>
        <Bar n={2} total={6} />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "48px 72px" }}>
          <div style={{ fontFamily: PF, fontSize: 36, color: BURG, lineHeight: 1.25, marginBottom: 30 }}>
            Hardy's HVAC is nearing end of life.
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 18, marginBottom: "auto" }}>
            {[
              "Article 67 appropriates $375k to fund a study & schematic design(?) to make the best decision for the town.",
              "The town will recieve a 43% rebate (~$161,250) due to our accepatnce into the MSBA Accelerated Repair Program.",
              "Town Meeting will vote, likely next year, on the construction project.  Tonight's vote is only on the study."
            ].map((pt, i) => (
              <div key={i} style={{ display: "flex", gap: 18, alignItems: "flex-start" }}>
                <div style={{ width: 11, height: 11, borderRadius: "50%", background: BURG, flexShrink: 0, marginTop: 9 }} />
                <div style={{ fontFamily: SS, fontSize: 22, color: BURG, lineHeight: 1.55 }}>{pt}</div>
              </div>
            ))}
          </div>
          <div style={{ borderTop: `4px solid ${BURG}`, paddingTop: 24 }}>
            <div style={{ fontFamily: SS, fontSize: 19, fontWeight: 600, color: BURG, lineHeight: 1.6 }}>
              This is not a vote to spend $13M. It is a vote to spend <strong>$375K</strong> to find the smartest path — and keep every option open.
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── SLIDE 3 ──────────────────────────────────────────────────────────────
  function Slide3() {
    const cats = [
      ["Air Conditioning",   false, true,  true,  true ],
      ["Net Zero Aligned",   false, false, true,  true ],
      ["MSBA Eligible",      false, false, true,  true ],
      ["IRA Direct Pay",     false, false, false, true ],
      ["Green School Works", false, false, false, true ],
    ];
    const opts = [
      { title: "Gas — No A/C",            net: "$3.97M", sub: "No grants available" },
      { title: "Gas + Air Conditioning", net: "$8.87M", sub: "No grants available" },
      { title: "Air Source Heat Pumps",  net: "$4.52M", sub: "$10.0M before grants" },
      { title: "Geothermal",             net: "$3.71M", sub: "$13.2M before grants", best: true },
    ];
    return (
      <div style={{ ...slide, background: CREAM }}>
        <Bar n={3} total={6} />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 44px" }}>
          <div style={{ fontFamily: PF, fontSize: 27, color: BURG, marginBottom: 16 }}>
            Four options — each with a very different cost to Arlington.
          </div>
          <div style={{ display: "flex", gap: 14, flex: 1 }}>
            {opts.map((o, i) => (
              <div key={i} style={{
                flex: 1, background: o.best ? PALE : WHITE,
                border: o.best ? `3px solid ${BURG}` : "1px solid #E5E7EB",
                borderRadius: 8, padding: "18px 12px",
                display: "flex", flexDirection: "column", alignItems: "center",
                position: "relative",
                boxShadow: o.best ? "0 6px 20px rgba(94,19,21,0.18)" : "none",
              }}>
                {o.best && (
                  <div style={{
                    position: "absolute", top: -13, left: "50%", transform: "translateX(-50%)",
                    background: BURG, color: WHITE, fontFamily: SS, fontSize: 10, fontWeight: 700,
                    letterSpacing: "0.12em", textTransform: "uppercase",
                    padding: "3px 12px", borderRadius: 12, whiteSpace: "nowrap",
                  }}>Lowest Cost</div>
                )}
                <div style={{
                  fontFamily: SS, fontSize: 17, fontWeight: 700, color: BURG,
                  textAlign: "center", lineHeight: 1.3, marginBottom: 14,
                  minHeight: 48, display: "flex", alignItems: "center", justifyContent: "center",
                }}>{o.title}</div>
                <div style={{ textAlign: "center", marginBottom: 14 }}>
                  <div style={{ fontFamily: SS, fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: BURG2, marginBottom: 3 }}>Cost to Arlington</div>
                  <div style={{ fontFamily: PF, fontSize: 36, color: BURG, lineHeight: 1 }}>{o.net}</div>
                  <div style={{ fontFamily: SS, fontSize: 12, color: BURG2, marginTop: 3 }}>{o.sub}</div>
                </div>
                <div style={{ height: 2, background: o.best ? BURG2 : "#E5E7EB", width: "100%", marginBottom: 14 }} />
                <div style={{ display: "flex", flexDirection: "column", gap: 9, width: "100%", alignItems: "center" }}>
                  {cats.map(([label, ...vals]) => {
                    const val = vals[i];
                    return (
                      <div key={label} style={{
                        fontFamily: SS, fontSize: 12, fontWeight: val ? 700 : 400,
                        color: val ? GREEN : LGREY, textAlign: "center", lineHeight: 1.2,
                      }}>
                        {val ? `✓ ${label}` : label}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── SLIDE 4 ──────────────────────────────────────────────────────────────
  function Slide4() {
    const points = [
      "Replacement happens regardless — potentially as a costly emergency",
      "Arlington exits grant programs already underway — MSBA, IRA, MassSave all require advance planning",
      "Arlington's Net Zero goals take a significant setback",
    ];
    return (
      <div style={{ ...slide, background: CREAM }}>
        <Bar n={4} total={6} />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "44px 72px" }}>
          <div style={{ fontFamily: PF, fontSize: 36, color: BURG, marginBottom: 40 }}>
            The impact of a NO vote.
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 26 }}>
            {points.map((pt, i) => (
              <div key={i} style={{ display: "flex", gap: 24, alignItems: "center" }}>
                <div style={{
                  width: 48, height: 48, borderRadius: "50%",
                  background: BURG, color: WHITE, flexShrink: 0,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontFamily: SS, fontWeight: 700, fontSize: 22,
                }}>{i + 1}</div>
                <div style={{ fontFamily: SS, fontSize: 22, fontWeight: 700, color: BURG, lineHeight: 1.4 }}>{pt}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── SLIDE 5 ──────────────────────────────────────────────────────────────
  function Slide5() {
    const steps = [
      { date: "May 6, 2026",  action: "Town Meeting votes YES on Article 67", active: true },
      { date: "Summer 2026",  action: "Feasibility study begins" },
      { date: "Spring 2027",  action: "Construction vote at Town Meeting" },
    ];
    return (
      <div style={{ ...slide, background: WHITE }}>
        <Bar n={5} total={6} />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "44px 80px" }}>
          <div style={{ fontFamily: PF, fontSize: 34, color: BURG, marginBottom: 52 }}>
            Tonight starts a deliberate process.
          </div>
          <div style={{ display: "flex", flexDirection: "column" }}>
            {steps.map((s, i) => (
              <div key={i} style={{ display: "flex", alignItems: "stretch" }}>
                <div style={{ width: 72, display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                  <div style={{
                    width: 56, height: 56, borderRadius: "50%",
                    background: s.active ? BURG : CREAM,
                    border: s.active ? "none" : `3px solid ${BURG}`,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: s.active ? WHITE : BURG,
                    fontFamily: SS, fontWeight: 700, fontSize: 24,
                  }}>{i + 1}</div>
                  {i < steps.length - 1 && (
                    <div style={{ width: 4, flex: 1, background: "#E5E7EB", minHeight: 36 }} />
                  )}
                </div>
                <div style={{ flex: 1, paddingLeft: 28, paddingBottom: i < steps.length - 1 ? 40 : 0, display: "flex", flexDirection: "column", justifyContent: "flex-start" }}>
                  <div style={{ fontFamily: SS, fontSize: 17, fontWeight: 600, color: BURG2, marginBottom: 5, marginTop: 10 }}>{s.date}</div>
                  <div style={{ fontFamily: SS, fontSize: 27, fontWeight: 700, color: BURG, lineHeight: 1.3 }}>{s.action}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── SLIDE 6 ──────────────────────────────────────────────────────────────
  function Slide6() {
    const reasons = [
      "Preserves eligibility for MSBA, IRA Direct Pay, MassSave, Climate Leaders, and Green School Works",
      "Returns to Town Meeting in Spring 2027 with a full design and cost picture — no construction is authorized tonight",
      "Positions Hardy School for air conditioning and long-term Net Zero alignment",
      "Avoids a costlier, unplanned emergency gas replacement with no funding offsets",
    ];
    return (
      <div style={{ ...slide, background: BURG }}>
        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 7, background: BURG2 }} />
        <div style={{ padding: "32px 72px 26px", borderBottom: "2px solid rgba(255,255,255,0.2)" }}>
          <div style={{ fontFamily: PF, fontSize: 28, color: WHITE, lineHeight: 1.4 }}>
            A YES vote will authorize $375,000 for a feasibility study to determine the best path for Hardy School's HVAC replacement.
          </div>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "18px 72px", gap: 20 }}>
          {reasons.map((r, i) => (
            <div key={i} style={{ display: "flex", gap: 20, alignItems: "flex-start" }}>
              <div style={{
                width: 34, height: 34, borderRadius: "50%",
                background: "rgba(255,255,255,0.18)",
                border: "2px solid rgba(255,255,255,0.35)",
                display: "flex", alignItems: "center", justifyContent: "center",
                flexShrink: 0, color: WHITE,
                fontFamily: SS, fontWeight: 700, fontSize: 15,
                marginTop: 2,
              }}>{i + 1}</div>
              <div style={{ fontFamily: SS, fontSize: 17, fontWeight: 600, color: WHITE, lineHeight: 1.65 }}>{r}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  const SLIDES = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6];
  const TITLES = ["Title", "The Problem", "Four Options", "No Vote", "Timeline", "The Ask"];

  function App() {
    const [cur, setCur] = useState(0);
    const prev = useCallback(() => setCur(c => Math.max(0, c - 1)), []);
    const next = useCallback(() => setCur(c => Math.min(SLIDES.length - 1, c + 1)), []);

    useEffect(() => {
      const h = (e) => {
        if (e.key === "ArrowRight" || e.key === "ArrowDown") next();
        if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   prev();
      };
      window.addEventListener("keydown", h);
      return () => window.removeEventListener("keydown", h);
    }, [next, prev]);

    // Update nav controls imperatively (outside React root)
    useEffect(() => {
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const dotsEl  = document.getElementById("dots");
      const label   = document.getElementById("slide-label");
      if (!prevBtn) return;

      prevBtn.disabled = cur === 0;
      nextBtn.disabled = cur === SLIDES.length - 1;
      label.textContent = `${cur + 1} / ${SLIDES.length} — ${TITLES[cur]}`;

      dotsEl.innerHTML = "";
      SLIDES.forEach((_, i) => {
        const d = document.createElement("div");
        d.className = "dot" + (i === cur ? " active" : "");
        d.style.width = i === cur ? "26px" : "12px"; // Increased inactive dot width slightly for proportion
        d.addEventListener("click", () => setCur(i));
        dotsEl.appendChild(d);
      });

      prevBtn.onclick = prev;
      nextBtn.onclick = next;
    }, [cur]);

    const S = SLIDES[cur];
    return <S />;
  }

  ReactDOM.createRoot(document.getElementById("react-root")).render(<App />);
</script>
</body>
</html>
