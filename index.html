const BURG  = "#5e1315";

const PF = "'Playfair Display', Georgia, serif";

// All sizing in vw units relative to the slide width
// Slide is always 16:9, so height = 56.25vw of slide width
// We compute a "scale" from actual rendered slide width so fonts are proportional

function useSlideScale() {
  const ref = useRef(null);
  const [w, setW] = useState(800);
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(([e]) => setW(e.contentRect.width));
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);
  // base design width: 960px → all sizes relative to that
  return [ref, w / 960];
}

function Bar({ n, total }) {
  return (
    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "0.7%", background: "rgba(0,0,0,0.15)" }}>
      <div style={{ height: "100%", width: `${(n / total) * 100}%`, background: BURG2 }} />
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────
const SLIDE_COMPONENTS = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6];
const TITLES = ["Title", "The Problem", "Four Options", "No Vote", "Timeline", "The Ask"];

function App() {
  const [cur, setCur] = useState(0);
  const [ref, scale] = useSlideScale();

  const prev = useCallback(() => setCur(c => Math.max(0, c - 1)), []);
  const next = useCallback(() => setCur(c => Math.min(SLIDE_COMPONENTS.length - 1, c + 1)), []);

  useEffect(() => {
    const h = (e) => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") next();
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   prev();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [next, prev]);

  // s(n) returns n * scale — all design units relative to 960px base
  const s = (n) => n * scale;

  const S = SLIDE_COMPONENTS[cur];

  return (
    <div style={{
      width: "100%", height: "100%",
      display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      padding: `${s(12)}px`,
      background: "#1a0507",
    }}>
      {/* Slide */}
      <div
        ref={ref}
        style={{
          width: "100%",
          maxWidth: s(960) > window.innerWidth - s(24) ? "100%" : 960,
          aspectRatio: "16/9",
          boxShadow: "0 24px 64px rgba(0,0,0,0.75)",
          borderRadius: s(4),
          overflow: "hidden",
          flexShrink: 0,
        }}
      >
        <S s={s} />
      </div>

      {/* Nav */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        width: "100%", maxWidth: 960, marginTop: s(14),
      }}>
        <button onClick={prev} disabled={cur === 0} style={{
          background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.14)",
          color: WHITE, padding: `${s(7)}px ${s(20)}px`, borderRadius: s(4),
          cursor: cur === 0 ? "not-allowed" : "pointer",
          fontFamily: SS, fontSize: Math.max(s(12), 11),
          letterSpacing: "0.08em", textTransform: "uppercase",
          opacity: cur === 0 ? 0.25 : 1,
        }}>← Prev</button>

        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: s(7) }}>
          <div style={{ display: "flex", gap: s(7) }}>
            {SLIDE_COMPONENTS.map((_, i) => (
              <div key={i} onClick={() => setCur(i)} style={{
                width: i === cur ? s(26) : s(9), height: s(9), borderRadius: s(5),
                background: i === cur ? "rgba(255,255,255,0.65)" : "rgba(255,255,255,0.18)",
                cursor: "pointer", transition: "width 0.25s",
              }} />
            ))}
          </div>
          <div style={{ fontFamily: SS, fontSize: Math.max(s(11), 10), color: "rgba(255,255,255,0.22)" }}>
            {cur + 1} / {SLIDE_COMPONENTS.length} — {TITLES[cur]}
          </div>
        </div>

        <button onClick={next} disabled={cur === SLIDE_COMPONENTS.length - 1} style={{
          background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.14)",
          color: WHITE, padding: `${s(7)}px ${s(20)}px`, borderRadius: s(4),
          cursor: cur === SLIDE_COMPONENTS.length - 1 ? "not-allowed" : "pointer",
          fontFamily: SS, fontSize: Math.max(s(12), 11),
          letterSpacing: "0.08em", textTransform: "uppercase",
          opacity: cur === SLIDE_COMPONENTS.length - 1 ? 0.25 : 1,
        }}>Next →</button>
      </div>

      <div style={{ marginTop: s(8), fontFamily: SS, fontSize: Math.max(s(11), 10), color: "rgba(255,255,255,0.12)" }}>
        ← → arrow keys to navigate
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
