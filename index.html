<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hardy School HVAC — Warrant Article #67</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { background: #1a0507; font-family: Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const BURG   = "#5e1315";
    const BURG_L = "#8b2326";
    const WHITE  = "#FFFFFF";
    const OFFWH  = "#F8F5F2";
    const LGRAY  = "#F3F4F6";
    const MGRAY  = "#9CA3AF";
    const DGRAY  = "#374151";
    const GREEN  = "#15803D";

    const base = {
      width: "100%", height: "100%",
      display: "flex", flexDirection: "column",
      position: "relative", overflow: "hidden",
    };

    function Bar({ n, total }) {
      return (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 6, background: "#E5E7EB" }}>
          <div style={{ height: "100%", width: `${(n / total) * 100}%`, background: BURG_L }} />
        </div>
      );
    }

    // ── SLIDE 1 ───────────────────────────────────────────────────────────────
    function Slide1() {
      return (
        <div style={{ ...base, background: BURG }}>
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 6, background: BURG_L }} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "48px 72px" }}>
            <div style={{ fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: MGRAY, fontFamily: "Arial, sans-serif", marginBottom: 24 }}>
              Town of Arlington · Annual Town Meeting · May 6, 2026
            </div>
            <div style={{ fontSize: 40, fontWeight: "bold", color: WHITE, lineHeight: 1.25, marginBottom: 60 }}>
              Warrant Article 67 — Hardy School<br />HVAC Feasibility Study
            </div>
            <div style={{ fontSize: 14, letterSpacing: "0.12em", textTransform: "uppercase", color: MGRAY, fontFamily: "Arial, sans-serif", marginBottom: 16 }}>
              FY27 Appropriation Request
            </div>
            <div style={{ fontSize: 72, fontWeight: "bold", color: WHITE, lineHeight: 1, letterSpacing: "-0.02em" }}>
              $375,000
            </div>
          </div>
          <div style={{ padding: "14px 72px", borderTop: "1px solid rgba(255,255,255,0.08)", fontSize: 12, color: "rgba(255,255,255,0.25)", fontFamily: "Arial, sans-serif" }}>
            School Committee · Department of Public Facilities
          </div>
        </div>
      );
    }

    // ── SLIDE 2 ───────────────────────────────────────────────────────────────
    function Slide2() {
      const equipment = [
        "10 Rooftop HVAC Units",
        "2 Boilers",
        "Building Management System",
        "75 In-Classroom Radiators",
      ];
      return (
        <div style={{ ...base, background: OFFWH }}>
          <Bar n={2} total={6} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "44px 64px" }}>

            {/* Main message */}
            <div style={{ fontSize: 34, fontWeight: "bold", color: BURG, lineHeight: 1.25, marginBottom: 28 }}>
              Hardy's major HVAC equipment is nearing end of life.
            </div>

            {/* Bullet points */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: "auto" }}>
              {[
                "Replacement is mandatory — the only question is how.",
                "Tonight's vote authorizes a study. Construction requires a second vote at Town Meeting in Spring 2027.",
              ].map((pt, i) => (
                <div key={i} style={{ display: "flex", gap: 18, alignItems: "flex-start" }}>
                  <div style={{
                    width: 10, height: 10, borderRadius: "50%",
                    background: BURG, flexShrink: 0, marginTop: 10,
                  }} />
                  <div style={{ fontSize: 22, color: BURG, fontFamily: "Arial, sans-serif", lineHeight: 1.5 }}>{pt}</div>
                </div>
              ))}
            </div>

            {/* Equipment chips */}
            <div>
              <div style={{ fontSize: 11, fontFamily: "Arial, sans-serif", fontWeight: "bold", letterSpacing: "0.14em", textTransform: "uppercase", color: MGRAY, marginBottom: 14 }}>
                Equipment Requiring Replacement
              </div>
              <div style={{ display: "flex", gap: 12 }}>
                {equipment.map((e, i) => (
                  <div key={i} style={{
                    flex: 1, background: WHITE,
                    border: `1px solid #E5E7EB`,
                    borderTop: `4px solid ${BURG}`,
                    borderRadius: 6, padding: "14px 16px",
                    textAlign: "center",
                    fontSize: 14, fontWeight: "bold",
                    color: BURG, fontFamily: "Arial, sans-serif",
                    lineHeight: 1.3,
                  }}>{e}</div>
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // ── SLIDE 3 ───────────────────────────────────────────────────────────────
    function Slide3() {
      // [label, gas_no_ac, gas_ac, ashp, geo]
      const cats = [
        ["Air Conditioning",   false, true,  true,  true ],
        ["Net Zero Aligned",   false, false, true,  true ],
        ["MSBA Eligible",      false, false, true,  true ],
        ["IRA Direct Pay",     false, false, false, true ],
        ["Green School Works", false, false, false, true ],
      ];

      const opts = [
        { title: "Gas\nNo A/C",              net: "$3.97M", sub: "no grants available" },
        { title: "Gas +\nAir Conditioning",  net: "$8.87M", sub: "no grants available" },
        { title: "Air Source\nHeat Pumps",   net: "$4.52M", sub: "$10.0M before grants" },
        { title: "Geothermal",               net: "$3.71M", sub: "$13.2M before grants", best: true },
      ];

      return (
        <div style={{ ...base, background: OFFWH }}>
          <Bar n={3} total={6} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 44px" }}>
            <div style={{ fontSize: 26, fontWeight: "bold", color: BURG, marginBottom: 16 }}>
              There are four options — each with a very different cost to Arlington.
            </div>
            <div style={{ display: "flex", gap: 12, flex: 1 }}>
              {opts.map((o, i) => (
                <div key={i} style={{
                  flex: 1,
                  background: o.best ? "#F1EBE8" : WHITE,
                  border: o.best ? `2px solid ${BURG}` : "1px solid #E5E7EB",
                  borderRadius: 8,
                  padding: "18px 12px",
                  display: "flex", flexDirection: "column", alignItems: "center",
                  position: "relative",
                  boxShadow: o.best ? "0 4px 16px rgba(94,19,21,0.15)" : "none",
                }}>
                  {o.best && (
                    <div style={{
                      position: "absolute", top: -12, left: "50%", transform: "translateX(-50%)",
                      background: BURG, color: WHITE, fontSize: 9, fontWeight: "bold",
                      letterSpacing: "0.1em", textTransform: "uppercase",
                      padding: "3px 12px", borderRadius: 10,
                      fontFamily: "Arial, sans-serif", whiteSpace: "nowrap",
                    }}>Lowest Cost</div>
                  )}

                  {/* Option title — centered, big */}
                  <div style={{
                    fontSize: 17, fontWeight: "bold", color: BURG,
                    fontFamily: "Arial, sans-serif", lineHeight: 1.3,
                    textAlign: "center", marginBottom: 14,
                    whiteSpace: "pre-line", minHeight: 46,
                  }}>{o.title}</div>

                  {/* Cost — centered, big */}
                  <div style={{ textAlign: "center", marginBottom: 4 }}>
                    <div style={{ fontSize: 11, fontFamily: "Arial, sans-serif", color: MGRAY, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 2 }}>Cost to Arlington</div>
                    <div style={{ fontSize: 34, fontWeight: "bold", color: BURG, lineHeight: 1 }}>{o.net}</div>
                    <div style={{ fontSize: 11, color: MGRAY, fontFamily: "Arial, sans-serif", marginTop: 3 }}>{o.sub}</div>
                  </div>

                  <div style={{ height: 1, background: "#E5E7EB", margin: "14px 0", width: "100%" }} />

                  {/* Categories — text only, green bold if yes, grey if no */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%", alignItems: "center" }}>
                    {cats.map(([label, ...vals]) => {
                      const val = vals[i];
                      return (
                        <div key={label} style={{
                          fontSize: 12, fontFamily: "Arial, sans-serif",
                          fontWeight: val ? "bold" : "normal",
                          color: val ? GREEN : MGRAY,
                          textAlign: "center",
                          textDecoration: val ? "none" : "none",
                          lineHeight: 1.3,
                        }}>
                          {val ? "✓ " : ""}{label}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── SLIDE 4 ───────────────────────────────────────────────────────────────
    function Slide4() {
      const points = [
        "Replacement will be needed regardless — potentially as a costly emergency",
        "Arlington misses a once-in-a-generation opportunity for major grants",
        "Arlington's Net Zero commitments take a significant, likely permanent setback",
      ];
      return (
        <div style={{ ...base, background: OFFWH }}>
          <Bar n={4} total={6} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "44px 64px", gap: 0 }}>

            <div style={{ fontSize: 32, fontWeight: "bold", color: BURG, marginBottom: 36 }}>
              The impact of a NO vote.
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 20, marginBottom: 40 }}>
              {points.map((pt, i) => (
                <div key={i} style={{ display: "flex", gap: 20, alignItems: "center" }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: "50%",
                    background: BURG, color: WHITE, flexShrink: 0,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 20, fontWeight: "bold", fontFamily: "Arial, sans-serif",
                  }}>{i + 1}</div>
                  <div style={{ fontSize: 22, fontWeight: "bold", color: BURG, fontFamily: "Arial, sans-serif", lineHeight: 1.4 }}>{pt}</div>
                </div>
              ))}
            </div>

            <div style={{ borderTop: `3px solid ${BURG}`, paddingTop: 24 }}>
              <div style={{ fontSize: 20, color: BURG, fontFamily: "Arial, sans-serif", lineHeight: 1.5 }}>
                This is not a vote to spend $13M. It is a vote to spend <strong>$375K</strong> to determine the smartest path — and preserve every available option.
              </div>
            </div>

          </div>
        </div>
      );
    }

    // ── SLIDE 5 ───────────────────────────────────────────────────────────────
    function Slide5() {
      const steps = [
        { date: "May 6, 2026",    action: "Town Meeting votes YES on Article 67", active: true },
        { date: "Summer 2026",    action: "Feasibility study begins" },
        { date: "Spring 2027",    action: "Construction vote at Town Meeting" },
      ];
      return (
        <div style={{ ...base, background: WHITE }}>
          <Bar n={5} total={6} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "44px 72px", gap: 0 }}>

            <div style={{ fontSize: 30, fontWeight: "bold", color: BURG, marginBottom: 52 }}>
              Tonight starts a deliberate process.<br />
              <span style={{ fontSize: 20, fontWeight: "normal", color: MGRAY, fontFamily: "Arial, sans-serif" }}>No system is selected tonight. Construction requires a second vote.</span>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
              {steps.map((s, i) => (
                <div key={i} style={{ display: "flex", alignItems: "stretch", marginBottom: i < steps.length - 1 ? 0 : 0 }}>
                  {/* Left: circle + line */}
                  <div style={{ width: 60, display: "flex", flexDirection: "column", alignItems: "center" }}>
                    <div style={{
                      width: 48, height: 48, borderRadius: "50%", flexShrink: 0,
                      background: s.active ? BURG : LGRAY,
                      border: s.active ? "none" : `2px solid #D1D5DB`,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      color: s.active ? WHITE : MGRAY,
                      fontWeight: "bold", fontSize: 20, fontFamily: "Arial, sans-serif",
                    }}>{i + 1}</div>
                    {i < steps.length - 1 && (
                      <div style={{ width: 3, flex: 1, background: "#E5E7EB", minHeight: 32 }} />
                    )}
                  </div>

                  {/* Right: content */}
                  <div style={{ flex: 1, paddingLeft: 24, paddingBottom: i < steps.length - 1 ? 36 : 0, display: "flex", flexDirection: "column", justifyContent: "flex-start" }}>
                    <div style={{ fontSize: 14, fontFamily: "Arial, sans-serif", color: MGRAY, marginBottom: 4, marginTop: 10 }}>{s.date}</div>
                    <div style={{ fontSize: 26, fontWeight: "bold", color: BURG, fontFamily: "Arial, sans-serif", lineHeight: 1.3 }}>{s.action}</div>
                  </div>
                </div>
              ))}
            </div>

          </div>
        </div>
      );
    }

    // ── SLIDE 6 ───────────────────────────────────────────────────────────────
    function Slide6() {
      const reasons = [
        "Preserves eligibility for MSBA, IRA Direct Pay, MassSave, Climate Leaders, and Green School Works grants",
        "Returns to Town Meeting in Spring 2027 with a full design and cost picture — no construction is authorized tonight",
        "Positions Hardy School for air conditioning and long-term Net Zero alignment",
        "Avoids a costlier, unplanned emergency gas replacement with no offsets",
      ];
      return (
        <div style={{ ...base, background: BURG }}>
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 6, background: BURG_L }} />

          {/* Top third: title */}
          <div style={{
            borderBottom: "1px solid rgba(255,255,255,0.15)",
            padding: "36px 64px",
            display: "flex", alignItems: "center",
          }}>
            <div style={{ fontSize: 28, fontWeight: "bold", color: WHITE, lineHeight: 1.35 }}>
              A YES vote will authorize $375,000 for a feasibility study to determine the best path for Hardy School's HVAC replacement.
            </div>
          </div>

          {/* Bottom two-thirds: reasons */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "28px 64px", gap: 20 }}>
            {reasons.map((r, i) => (
              <div key={i} style={{ display: "flex", gap: 20, alignItems: "flex-start" }}>
                <div style={{
                  width: 32, height: 32, borderRadius: "50%",
                  background: "rgba(255,255,255,0.15)",
                  border: "1px solid rgba(255,255,255,0.3)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  flexShrink: 0, color: WHITE,
                  fontWeight: "bold", fontSize: 14, fontFamily: "Arial, sans-serif",
                  marginTop: 2,
                }}>{i + 1}</div>
                <div style={{ fontSize: 17, color: "rgba(255,255,255,0.9)", fontFamily: "Arial, sans-serif", lineHeight: 1.65 }}>{r}</div>
              </div>
            ))}
          </div>

        </div>
      );
    }

    const SLIDES = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6];
    const TITLES = ["Title", "The Problem", "Four Options", "No Vote Impact", "Timeline", "The Ask"];

    function App() {
      const [cur, setCur] = useState(0);
      const prev = useCallback(() => setCur(c => Math.max(0, c - 1)), []);
      const next = useCallback(() => setCur(c => Math.min(SLIDES.length - 1, c + 1)), []);

      useEffect(() => {
        const h = (e) => {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") next();
          if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   prev();
        };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, [next, prev]);

      const S = SLIDES[cur];

      return (
        <div style={{
          background: "#1a0507", minHeight: "100vh",
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", padding: 16,
        }}>
          <div style={{
            width: "100%", maxWidth: 960,
            aspectRatio: "16/9",
            boxShadow: "0 20px 60px rgba(0,0,0,0.7)",
            borderRadius: 4, overflow: "hidden",
          }}>
            <S />
          </div>

          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            width: "100%", maxWidth: 960, marginTop: 14,
          }}>
            <button onClick={prev} disabled={cur === 0} style={{
              background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)",
              color: WHITE, padding: "7px 20px", borderRadius: 4,
              cursor: cur === 0 ? "not-allowed" : "pointer",
              fontFamily: "Arial, sans-serif", fontSize: 12,
              letterSpacing: "0.06em", textTransform: "uppercase",
              opacity: cur === 0 ? 0.3 : 1,
            }}>← Prev</button>

            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
              <div style={{ display: "flex", gap: 6 }}>
                {SLIDES.map((_, i) => (
                  <div key={i} onClick={() => setCur(i)} style={{
                    width: i === cur ? 24 : 8, height: 8, borderRadius: 4,
                    background: i === cur ? "rgba(255,255,255,0.6)" : "rgba(255,255,255,0.18)",
                    cursor: "pointer", transition: "width 0.3s",
                  }} />
                ))}
              </div>
              <div style={{ color: "rgba(255,255,255,0.18)", fontFamily: "Arial, sans-serif", fontSize: 11 }}>
                {cur + 1} / {SLIDES.length} — {TITLES[cur]}
              </div>
            </div>

            <button onClick={next} disabled={cur === SLIDES.length - 1} style={{
              background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)",
              color: WHITE, padding: "7px 20px", borderRadius: 4,
              cursor: cur === SLIDES.length - 1 ? "not-allowed" : "pointer",
              fontFamily: "Arial, sans-serif", fontSize: 12,
              letterSpacing: "0.06em", textTransform: "uppercase",
              opacity: cur === SLIDES.length - 1 ? 0.3 : 1,
            }}>Next →</button>
          </div>

          <div style={{ marginTop: 8, color: "rgba(255,255,255,0.1)", fontFamily: "Arial, sans-serif", fontSize: 11 }}>
            ← → arrow keys to navigate
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
